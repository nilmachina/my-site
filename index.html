<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ENTER</title>

<style>
:root {
  --bg: #050608;
  --fg: #eef2ff;
  --muted: rgba(238, 242, 255, 0.65);
  --panel: rgba(8, 10, 14, 0.62);
  --panel-border: rgba(255, 255, 255, 0.14);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: var(--bg-gif) center/cover no-repeat;
  filter: brightness(0.75) contrast(1.1);
  transform: scale(1.05);
  z-index: -2;
}

.grain {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03),
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 2px
  );
  opacity: 0.1;
  pointer-events: none;
  z-index: -1;
}

/* TERMINAL */
.terminal-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
}

.terminal {
  width: min(90vw, 700px);
  padding: 20px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  font-family: "Courier New", monospace;
}

.terminal-text {
  min-height: 200px;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 16px;
}

.caret {
  display: inline-block;
  width: 8px;
  height: 18px;
  background: white;
  animation: blink 0.9s infinite;
}

/* GATE */
.enter-stage {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
}

.enter-stage.ready {
  opacity: 1;
  pointer-events: auto;
}

.gate {
  width: 220px;
  cursor: pointer;
  animation: float 4s ease-in-out infinite;
}

.gate:hover {
  animation: float 4s ease-in-out infinite, shake 0.3s infinite;
}

.gate img {
  width: 100%;
  display: block;
}

/* FLASH */
.flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

.flash.on {
  opacity: 1;
}

/* ANIMATIONS */
@keyframes blink {
  50% { opacity: 0; }
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(2px); }
  50% { transform: translateX(-2px); }
  75% { transform: translateX(2px); }
}
</style>
</head>

<body>

<script>
const BG_GIF_URL = "assets/background.gif";
document.documentElement.style.setProperty("--bg-gif", `url('${BG_GIF_URL}')`);
</script>

<div class="bg"></div>
<div class="grain"></div>
<div class="flash" id="flash"></div>

<div class="terminal-wrap" id="terminalWrap">
  <div class="terminal">
    <div class="terminal-text">
      <span id="typed"></span><span class="caret"></span>
    </div>
  </div>
</div>

<div class="enter-stage" id="enterStage">
  <div class="gate" id="gate">
    <img src="assets/gate.png" alt="enter"/>
  </div>
</div>

<script>
const messages = [
  "// initializing shrine shell...",
  "// searching for a signal in the static...",
  "// loading atmosphere [OK]",
  "// waking the gate / calibrating drift...",
  "// one moment.",
  "// one flash.",
  "// then the door.",
  "// ready."
];

const typedEl = document.getElementById("typed");
const flash = document.getElementById("flash");
const terminalWrap = document.getElementById("terminalWrap");
const enterStage = document.getElementById("enterStage");
const gate = document.getElementById("gate");

const fullText = messages.join("\n\n");

let i = 0;

function type() {
  if (i < fullText.length) {

    let burst = Math.floor(Math.random() * 4) + 2;
    let chunk = "";

    for (let j = 0; j < burst && i < fullText.length; j++, i++) {
      chunk += fullText[i];
    }

    typedEl.textContent += chunk;

    setTimeout(type, 12 + Math.random() * 20);
  } else {
    setTimeout(reveal, 400);
  }
}

function reveal() {
  flash.classList.add("on");

  setTimeout(() => {
    terminalWrap.style.opacity = "0";
    enterStage.classList.add("ready");
  }, 200);

  setTimeout(() => {
    flash.classList.remove("on");
  }, 700);

  setTimeout(() => {
    terminalWrap.style.display = "none";
  }, 1100);
}

gate.onclick = () => {
  flash.classList.add("on");

  setTimeout(() => {
    window.location.href = "hub.html";
  }, 400);
};

type();
</script>

</body>
</html>
