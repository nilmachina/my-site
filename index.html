<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTER</title>

<style>
:root {
  --bg: #050608;
  --fg: #eef2ff;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
  font-family: "Courier New", monospace;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: var(--bg-gif) center/cover no-repeat;
  filter: brightness(0.75) contrast(1.1);
  z-index: -2;
}

.flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 10;
}
.flash.on { opacity: 1; }

/* TERMINAL */
.terminal-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  transition: opacity 0.8s ease;
}

.terminal {
  width: min(90vw, 700px);
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 12px;
}

.terminal-text {
  min-height: 200px;
  white-space: pre-wrap;
  line-height: 1.6;
}

.caret {
  display: inline-block;
  width: 8px;
  height: 16px;
  background: white;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* GATE */
.enter-stage {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
}

.enter-stage.show {
  opacity: 1;
  pointer-events: auto;
}

.gate {
  width: 220px;
  cursor: pointer;
  animation: float 4s ease-in-out infinite;
}

.gate:hover {
  animation: float 4s ease-in-out infinite, shake 0.3s infinite;
}

.gate img {
  width: 100%;
  image-rendering: pixelated;
}

/* ANIMATIONS */
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@keyframes shake {
  0% { transform: translateX(0); }
  50% { transform: translateX(2px); }
}
</style>
</head>

<body>

<script>
document.documentElement.style.setProperty(
  "--bg-gif",
  "url('background.gif')"
);
</script>

<div class="bg"></div>
<div class="flash" id="flash"></div>

<div class="terminal-wrap" id="terminalWrap">
  <div class="terminal">
    <div class="terminal-text">
      <span id="typed"></span><span class="caret"></span>
    </div>
  </div>
</div>

<div class="enter-stage" id="enterStage">
  <div class="gate" id="gate">
    <img src="gate.png">
  </div>
</div>

<script>
const messages = [
  "// initializing shrine shell...",
  "// searching for a signal...",
  "// loading atmosphere [OK]",
  "// calibrating gate...",
  "// one moment.",
  "// one flash.",
  "// then the door.",
  "// ready."
];

const typed = document.getElementById("typed");
const flash = document.getElementById("flash");
const terminalWrap = document.getElementById("terminalWrap");
const enterStage = document.getElementById("enterStage");
const gate = document.getElementById("gate");

const fullText = messages.join("\n\n");

let i = 0;

function type() {
  if (i < fullText.length) {
    let burst = Math.floor(Math.random() * 4) + 2;
    let chunk = "";

    for (let j = 0; j < burst && i < fullText.length; j++, i++) {
      chunk += fullText[i];
    }

    typed.textContent += chunk;

    setTimeout(type, 15 + Math.random() * 20);
  } else {
    setTimeout(reveal, 400);
  }
}

function reveal() {
  flash.classList.add("on");

  setTimeout(() => {
    terminalWrap.style.opacity = "0";
    enterStage.classList.add("show");
  }, 200);

  setTimeout(() => {
    flash.classList.remove("on");
  }, 700);

  setTimeout(() => {
    terminalWrap.style.display = "none";
  }, 1000);
}

gate.onclick = () => {
  flash.classList.add("on");

  setTimeout(() => {
    window.location.href = "hub.html";
  }, 400);
};

type();
</script>

</body>
</html>
