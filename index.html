<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENTER</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: "Courier New", monospace;
  color: white;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: url("background.gif") center/cover no-repeat;
  filter: brightness(0.7);
  z-index: -2;

  animation: drift 20s ease-in-out infinite alternate;
}

@keyframes drift {
  0% { transform: scale(1.05) translate(0,0); }
  100% { transform: scale(1.1) translate(-1%, -1%); }
}
/* FLASH */
.flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  transition: 0.4s;
  pointer-events: none;
}
.flash.on { opacity: 1; }

/* TERMINAL */
.terminal-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  transition: opacity 0.8s;
}

.terminal {
  width: 90%;
  max-width: 700px;
  padding: 20px;
  background: rgba(0,0,0,0.6);
  border: 1px solid white;
}

.caret {
  display: inline-block;
  width: 8px;
  height: 16px;
  background: white;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* GATE */
.enter-stage {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s;
}

.enter-stage.show {
  opacity: 1;
  pointer-events: auto;
}

.gate {
  width: 220px;
  cursor: pointer;
  animation: float 4s ease-in-out infinite;
}

.gate img {
  width: 100%;
  image-rendering: pixelated;
}

.gate:hover img {
  animation: shake 0.2s infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,0); }
  50% { transform: translate(-2px,0); }
  75% { transform: translate(1px,0); }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="flash" id="flash"></div>

<div class="terminal-wrap" id="terminalWrap">
  <div>
    <span id="typed"></span><span class="caret"></span>
  </div>
</div>

<div class="enter-stage" id="enterStage">
  <div class="gate" id="gate">
    <img src="gate.png">
  </div>
</div>

<script>
const messages = [
  "// initializing shrine shell...",
  "// searching for signal...",
  "// loading atmosphere...",
  "// calibrating gate...",
  "// one moment.",
  "// one flash.",
  "// then the door.",
  "// ready."
];

const typed = document.getElementById("typed");
const flash = document.getElementById("flash");
const terminalWrap = document.getElementById("terminalWrap");
const enterStage = document.getElementById("enterStage");
const gate = document.getElementById("gate");

const fullText = messages.join("\\n\\n");

let i = 0;

function type() {
  if (i < fullText.length) {
    let burst = Math.floor(Math.random()*4)+2;
    let chunk = "";

    for (let j=0; j<burst && i<fullText.length; j++, i++) {
      chunk += fullText[i];
    }

    typed.textContent += chunk;
    setTimeout(type, 15 + Math.random()*20);
  } else {
    setTimeout(reveal, 400);
  }
}

function reveal() {
  flash.classList.add("on");

  setTimeout(()=>{
    terminalWrap.style.opacity = "0";
    enterStage.classList.add("show");
  },200);

  setTimeout(()=>flash.classList.remove("on"),700);

  setTimeout(()=>{
    terminalWrap.style.display = "none";
  },1000);
}

gate.onclick = () => {
  flash.classList.add("on");
  setTimeout(()=>{
    window.location.href = "hub.html";
  },400);
};

type();
</script>

</body>
</html>
